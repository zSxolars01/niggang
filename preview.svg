<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#040d1c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#0044cc;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#020810;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#020810;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="80%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#020810;stop-opacity:0"/>
    </radialGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,170,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Top bar -->
  <rect width="1200" height="3" fill="url(#bargrad)"/>
  <defs>
    <linearGradient id="bargrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#001a3a"/>
      <stop offset="30%" style="stop-color:#00aaff"/>
      <stop offset="70%" style="stop-color:#0066ff"/>
      <stop offset="100%" style="stop-color:#001a3a"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#00aaff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>

  <!-- Bottom bar -->
  <rect y="627" width="1200" height="3" fill="url(#bargrad)"/>

  <!-- Side lines -->
  <rect x="0" y="0" width="1" height="630" fill="url(#sideline)"/>
  <rect x="1199" y="0" width="1" height="630" fill="url(#sideline)"/>
  <defs>
    <linearGradient id="sideline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#00aaff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>

  <!-- Corner accents -->
  <polyline points="40,20 20,20 20,40" fill="none" stroke="#00aaff" stroke-width="2" opacity="0.5"/>
  <polyline points="1160,20 1180,20 1180,40" fill="none" stroke="#00aaff" stroke-width="2" opacity="0.5"/>
  <polyline points="40,610 20,610 20,590" fill="none" stroke="#00aaff" stroke-width="2" opacity="0.5"/>
  <polyline points="1160,610 1180,610 1180,590" fill="none" stroke="#00aaff" stroke-width="2" opacity="0.5"/>

  <!-- Tag -->
  <text x="600" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#00aaff" opacity="0.7" letter-spacing="8" filter="url(#subtleglow)">EQUIPO COMPETITIVO · LEAGUE OF LEGENDS · LAN</text>

  <!-- Decorative lines beside title -->
  <rect x="140" y="295" width="160" height="1" fill="url(#linegrad)" opacity="0.8"/>
  <rect x="900" y="295" width="160" height="1" fill="url(#linegrad)" opacity="0.8"/>

  <!-- Main title NIGGANG -->
  <text x="600" y="340" text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="130" font-weight="900"
    fill="#00aaff" opacity="0.15"
    letter-spacing="12">NIGGANG</text>
  <text x="600" y="340" text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="130" font-weight="900"
    fill="white"
    letter-spacing="12"
    filter="url(#textglow)"
    style="text-shadow: 0 0 60px #00aaff">NIGGANG</text>

  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(200,216,240,0.45)" letter-spacing="5">CINCO JUGADORES · UNA SOLA MENTALIDAD</text>

  <!-- Divider line -->
  <rect x="540" y="425" width="120" height="2" fill="#00aaff" opacity="0.5" rx="1"/>

  <!-- Role badges -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3">
    <!-- TOP -->
    <rect x="155" y="468" width="80" height="28" rx="14" fill="rgba(255,160,0,0.1)" stroke="rgba(255,160,0,0.4)" stroke-width="1"/>
    <text x="195" y="487" text-anchor="middle" fill="#ffa000">TOP</text>
    <!-- JUNGLE -->
    <rect x="255" y="468" width="100" height="28" rx="14" fill="rgba(0,220,100,0.1)" stroke="rgba(0,220,100,0.4)" stroke-width="1"/>
    <text x="305" y="487" text-anchor="middle" fill="#00dc64">JUNGLE</text>
    <!-- MID -->
    <rect x="375" y="468" width="80" height="28" rx="14" fill="rgba(255,80,180,0.1)" stroke="rgba(255,80,180,0.4)" stroke-width="1"/>
    <text x="415" y="487" text-anchor="middle" fill="#ff50b4">MID</text>
    <!-- ADC -->
    <rect x="475" y="468" width="80" height="28" rx="14" fill="rgba(255,60,60,0.1)" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>
    <text x="515" y="487" text-anchor="middle" fill="#ff4040">ADC</text>
    <!-- SUPPORT -->
    <rect x="575" y="468" width="110" height="28" rx="14" fill="rgba(0,200,255,0.1)" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
    <text x="630" y="487" text-anchor="middle" fill="#00c8ff">SUPPORT</text>
  </g>

  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(0,170,255,0.4)" letter-spacing="3">zsxolars01.github.io/niggang</text>
</svg>
